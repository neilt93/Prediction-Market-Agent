[project]
name = "prediction-agent-schemas"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "prediction-agent-shared",
    "sqlalchemy[asyncio]>=2.0.30",
    "pgvector>=0.3.0",
    "pydantic>=2.7",
]

[tool.uv.sources]
prediction-agent-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/schemas"]
