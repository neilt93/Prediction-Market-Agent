[project]
name = "prediction-agent-forecasting"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "prediction-agent-shared",
    "prediction-agent-schemas",
    "prediction-agent-rules",
    "httpx>=0.27",
    "pydantic>=2.7",
]

[tool.uv.sources]
prediction-agent-shared = { workspace = true }
prediction-agent-schemas = { workspace = true }
prediction-agent-rules = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forecasting"]
