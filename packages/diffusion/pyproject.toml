[project]
name = "prediction-agent-diffusion"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "prediction-agent-shared",
    "prediction-agent-schemas",
    "prediction-agent-calibration",
    "torch>=2.2",
    "numpy>=1.26",
    "pandas>=2.2",
    "scikit-learn>=1.4",
    "matplotlib>=3.8",
]

[project.optional-dependencies]
tracking = ["wandb>=0.16"]

[tool.uv.sources]
prediction-agent-shared = { workspace = true }
prediction-agent-schemas = { workspace = true }
prediction-agent-calibration = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/diffusion"]
